services:
  memcore:
    build: .
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      - LITELLM_BASE_URL=http://192.168.8.150:4000/v1
      - LITELLM_API_KEY=sk-69415b996802d1a9fce35cad94e79a93
      - GATE_MODEL=deepseek-chat
      - GRAPHITI_URL=http://192.168.8.141:8000
      - LIGHTRAG_URL=http://192.168.8.140:9622
      - POSTGRES_URL=postgresql://memcore:memcore@memcore-db:5432/memcore
      - GATE_THRESHOLD=0.55
      - MCP_PORT=8020
      - EMBEDDING_URL=http://192.168.8.141:8100/v1/embeddings
      - EMBEDDING_MODEL=nomic-embed-text
      - EMBEDDING_DIM=384
      - RERANKER_ENABLED=true
      - RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
      - FACT_EXTRACTION_ENABLED=true
      - GRAPHITI_RECALL_TIMEOUT=10.0
    volumes:
      - reranker-cache:/app/.cache/huggingface
    depends_on:
      memcore-db:
        condition: service_healthy

  memcore-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=memcore
      - POSTGRES_PASSWORD=memcore
      - POSTGRES_DB=memcore
    volumes:
      - memcore-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memcore"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  memcore-pgdata:
  reranker-cache:
